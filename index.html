<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>iGaia - Native Flash Client</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    body { display: flex; flex-direction: column; }

    #titlebar {
      height: 40px;
      background: #2c2c2c;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid #444;
    }
    #draggable {
      flex: 1;
      padding-left: 10px;
      font-weight: bold;
      -webkit-app-region: drag;
    }
    .toolbar-buttons {
      display: flex;
      gap: 6px;
      margin: 0 10px;
    }
    .toolbar-buttons button {
      padding: 6px 14px;
      background: #3a3a3a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      font-size: 14px;
    }
    .toolbar-buttons button:hover {
      background: #505050;
    }

    .window-controls {
      display: flex;
      gap: 6px;
    }
    .window-controls button {
      width: 30px;
      height: 30px;
      background: #3a3a3a;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      border-radius: 4px;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .window-controls button:hover { background: #666; }
    .close:hover { background: #e81123 !important; }

    #content {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="titlebar">
    <div id="draggable">iGaia - Native Flash Client</div>

    <div class="toolbar-buttons" id="toolbar-buttons">
      <button onclick="navigateTo('https://www.gaiaonline.com/')">Home</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/forum/')">Forums</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/mygaia/')">My Gaia</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/games/')">Games</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/launch/rally/')">Rally</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/launch/zomg/')">zOMG</button>
      <button onclick="navigateTo('https://www.gaiaonline.com/inventory/')">Inventory</button>
    </div>

    <!-- Management Buttons -->
    <div style="margin-left: auto; padding-right: 8px; display: flex; gap: 6px;">
      <button onclick="openPluginsFolder()" style="background:#4caf50; padding: 6px 12px;">📁 Plugins</button>
      <button onclick="openSettings()" style="background:#9c27b0; padding: 6px 12px;">⚙️</button>
    </div>

    <div class="window-controls">
      <button onclick="minimizeWindow()">–</button>
      <button onclick="maximizeWindow()">□</button>
      <button class="close" onclick="closeWindow()">×</button>
    </div>
  </div>

  <webview 
    id="content" 
    src="https://www.gaiaonline.com/" 
    allowpopups 
    plugins 
    style="flex: 1; width: 100%; height: 100%;">
  </webview>

  <script>
    const { ipcRenderer } = require('electron');

    function navigateTo(url) {
      document.getElementById('content').src = url;
    }

    function minimizeWindow() { ipcRenderer.send('window-minimize'); }
    function maximizeWindow() { ipcRenderer.send('window-maximize'); }
    function closeWindow()   { ipcRenderer.send('window-close'); }

    // Open Plugins Folder
    function openPluginsFolder() {
      ipcRenderer.send('open-plugins-folder');
    }

    // Open Settings Modal with Theme Editor + Plugin Manager
    function openSettings() {
      const html = `
        <div id="igaia-settings-panel" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
              background:#1f1f1f;color:#fff;padding:25px;border-radius:10px;width:620px;
              box-shadow:0 0 40px rgba(0,0,0,0.95);z-index:99999;font-family:Arial,sans-serif;max-height:85vh;overflow-y:auto;">

          <h2 style="margin:0 0 20px 0;text-align:center;color:#9c27b0;">iGaia Settings</h2>

          <!-- Theme Editor Tab -->
          <h3>Theme Editor</h3>
          <div style="display:grid;grid-template-columns:160px 1fr;gap:12px;align-items:center;">
            <label>Toolbar Background:</label>
            <input type="color" id="toolbarBg" value="#2c2c2c">

            <label>Button Background:</label>
            <input type="color" id="buttonBg" value="#3a3a3a">

            <label>Button Hover:</label>
            <input type="color" id="buttonHover" value="#505050">

            <label>Text Color:</label>
            <input type="color" id="textColor" value="#ffffff">

            <label>Accent Color:</label>
            <input type="color" id="accentColor" value="#9c27b0">
          </div>

          <div style="margin-top:20px;text-align:center;">
            <button onclick="applyTheme()" style="padding:10px 22px;margin:6px;background:#9c27b0;color:white;border:none;border-radius:4px;cursor:pointer;">Apply Theme</button>
            <button onclick="exportTheme()" style="padding:10px 22px;margin:6px;">Export Theme</button>
            <button onclick="importTheme()" style="padding:10px 22px;margin:6px;">Import Theme</button>
            <button onclick="resetTheme()" style="padding:10px 22px;margin:6px;background:#d32f2f;color:white;border:none;border-radius:4px;cursor:pointer;">Reset Default</button>
          </div>

          <hr style="margin:25px 0;border-color:#444;">

          <!-- Plugin Manager -->
          <h3>Plugin Manager</h3>
          <div id="plugin-list" style="max-height:200px;overflow-y:auto;background:#2a2a2a;padding:10px;border-radius:6px;">
            Loading plugins...
          </div>

          <div style="text-align:center;margin-top:20px;">
            <button onclick="refreshPluginList()" style="padding:8px 18px;margin:5px;">Refresh List</button>
            <button onclick="closeSettingsPanel()" style="padding:8px 24px;">Close</button>
          </div>
        </div>
      `;

      if (!document.getElementById('igaia-settings-panel')) {
        const panel = document.createElement('div');
        panel.innerHTML = html;
        document.body.appendChild(panel.firstElementChild);
        refreshPluginList(); // Load plugin list immediately
      }
    }

    // Theme functions
    function applyTheme() {
      const toolbarBg = document.getElementById('toolbarBg').value;
      const buttonBg = document.getElementById('buttonBg').value;
      const buttonHover = document.getElementById('buttonHover').value;
      const textColor = document.getElementById('textColor').value;

      const css = `
        #titlebar { background: ${toolbarBg} !important; }
        .toolbar-buttons button { 
          background: ${buttonBg} !important; 
          color: ${textColor} !important;
        }
        .toolbar-buttons button:hover { 
          background: ${buttonHover} !important; 
        }
      `;

      let style = document.getElementById('igaia-custom-theme');
      if (!style) {
        style = document.createElement('style');
        style.id = 'igaia-custom-theme';
        document.head.appendChild(style);
      }
      style.innerHTML = css;
    }

    function exportTheme() {
      const theme = {
        toolbarBg: document.getElementById('toolbarBg').value,
        buttonBg: document.getElementById('buttonBg').value,
        buttonHover: document.getElementById('buttonHover').value,
        textColor: document.getElementById('textColor').value,
        accentColor: document.getElementById('accentColor').value
      };
      const dataStr = JSON.stringify(theme, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
      const link = document.createElement('a');
      link.href = dataUri;
      link.download = 'igaia-theme.json';
      link.click();
    }

    function importTheme() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const imported = JSON.parse(ev.target.result);
            if (imported.toolbarBg) document.getElementById('toolbarBg').value = imported.toolbarBg;
            if (imported.buttonBg) document.getElementById('buttonBg').value = imported.buttonBg;
            if (imported.buttonHover) document.getElementById('buttonHover').value = imported.buttonHover;
            if (imported.textColor) document.getElementById('textColor').value = imported.textColor;
            if (imported.accentColor) document.getElementById('accentColor').value = imported.accentColor;
            alert('Theme imported! Click "Apply Theme" to activate.');
          } catch(err) {
            alert('Invalid theme file!');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function resetTheme() {
      if (confirm('Reset to default theme?')) {
        document.getElementById('toolbarBg').value = '#2c2c2c';
        document.getElementById('buttonBg').value = '#3a3a3a';
        document.getElementById('buttonHover').value = '#505050';
        document.getElementById('textColor').value = '#ffffff';
        document.getElementById('accentColor').value = '#9c27b0';
      }
    }

    function closeSettingsPanel() {
      const panel = document.getElementById('igaia-settings-panel');
      if (panel) panel.remove();
    }

    // Plugin Manager - Refresh list
    function refreshPluginList() {
      ipcRenderer.send('get-plugin-list');
    }

    // Receive plugin list from main process
    ipcRenderer.on('plugin-list', (event, plugins) => {
      const container = document.getElementById('plugin-list');
      if (!container) return;

      let html = '';
      plugins.forEach(plugin => {
        html += `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #444;">
            <span>${plugin.name} <small style="color:#888">v${plugin.version}</small></span>
            <button onclick="togglePlugin('${plugin.folder}')" style="padding:4px 12px;background:${plugin.enabled ? '#4caf50' : '#f44336'};color:white;border:none;border-radius:4px;cursor:pointer;">
              ${plugin.enabled ? 'Disable' : 'Enable'}
            </button>
          </div>
        `;
      });

      if (plugins.length === 0) {
        html = '<p style="color:#888;text-align:center;">No plugins found.</p>';
      }

      container.innerHTML = html;
    });

    // Webview ready
    const webview = document.getElementById('content');
    webview.addEventListener('dom-ready', () => {
      console.log('[iGaia] Gaia webview is ready');
    });

    console.log('[iGaia] index.html loaded with built-in Theme + Plugin Manager');
  </script>
</body>
</html>
